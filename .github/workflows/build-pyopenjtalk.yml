name: Build pyopenjtalk wheels

on:
  workflow_dispatch:

env:
  PYOPENJTALK_VERSION: "0.4.1"

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          # - os: ubuntu-latest
          #   arch: aarch64
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download pyopenjtalk source
        run: |
          pip download --no-binary pyopenjtalk --no-deps "pyopenjtalk==$PYOPENJTALK_VERSION" -d sdist
          tar xzf "sdist/pyopenjtalk-$PYOPENJTALK_VERSION.tar.gz"
          mv "pyopenjtalk-$PYOPENJTALK_VERSION" pyopenjtalk-src

      # - name: Set up QEMU
      #   if: matrix.arch == 'aarch64'
      #   uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        with:
          package-dir: pyopenjtalk-src
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BEFORE_BUILD: "pip install setuptools wheel"
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  upload-wheels:
    needs: [build-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Get latest release tag
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag=$(gh release view --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload to latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.latest.outputs.tag }}
          files: wheels/*.whl
